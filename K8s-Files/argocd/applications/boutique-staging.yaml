# Staging cluster namespace. Git branch: use "test" until you create a dedicated "staging" branch.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: boutique-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Ahmedhessn/Project-on-prim---K8s.git
    targetRevision: test
    path: K8s-Files/helm/boutique
    helm:
      valueFiles:
        - values.yaml
        - values-staging.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
