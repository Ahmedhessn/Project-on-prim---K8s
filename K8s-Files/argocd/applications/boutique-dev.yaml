apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: boutique-dev
  namespace: argocd
  # finalizer optional: preserves resources on delete; remove if you prefer default Argo behavior
spec:
  project: default
  source:
    repoURL: https://github.com/Ahmedhessn/K8s-CD-files.git
    targetRevision: dev
    path: helm/boutique
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
