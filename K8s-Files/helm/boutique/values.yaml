# Default values — override per environment with values-dev.yaml / values-staging.yaml / values-prod.yaml
# Docker Hub user/org (same as DOCKERHUB_USERNAME in Jenkins).

imageRegistry: "01061875164"

# Image tags (bump via CI or manually); images are pulled from Docker Hub as {imageRegistry}/{service}:{tag}
images:
  adservice: "16-adservice"
  cartservice: "17-cartservice"
  checkoutservice: "18-checkoutservice"
  currencyservice: "12"
  emailservice: "26-emailservice"
  frontend: "6"
  loadgenerator: "4"
  paymentservice: "2"
  productcatalogservice: "7"
  recommendationservice: "3"
  shippingservice: "4"

redis:
  image: redis:alpine
  persistence:
    enabled: false
    # When enabling persistence, set storageClassName to a StorageClass on your cluster (see kubectl get storageclass). Common on VMs/k3s: local-path
    # storageClassName: local-path
    accessModes:
      - ReadWriteOnce
    size: 1Gi
  resources:
    requests:
      cpu: 70m
      memory: 200Mi
    limits:
      cpu: 125m
      memory: 256Mi

adservice:
  resources:
    requests:
      cpu: 200m
      memory: 180Mi
    limits:
      cpu: 300m
      memory: 300Mi

cartservice:
  resources:
    requests:
      cpu: 200m
      memory: 64Mi
    limits:
      cpu: 300m
      memory: 128Mi

checkoutservice:
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

currencyservice:
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

emailservice:
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

frontend:
  loadBalancerService: false
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

loadgenerator:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 300m
      memory: 256Mi
    limits:
      cpu: 600m
      memory: 512Mi

paymentservice:
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

productcatalogservice:
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

recommendationservice:
  resources:
    requests:
      cpu: 100m
      memory: 220Mi
    limits:
      cpu: 200m
      memory: 450Mi

shippingservice:
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

hpa:
  enabled: false
  targets:
    # Example:
    # frontend:
    #   minReplicas: 2
    #   maxReplicas: 10
    #   cpuUtilization: 60
    # cartservice:
    #   minReplicas: 2
    #   maxReplicas: 10
    #   cpuUtilization: 60

istio:
  rewriteAppHTTPProbers: true

ingress:
  enabled: true
  # IngressClass installed on your cluster (NGINX Ingress Controller is typical on VMs / bare metal)
  className: nginx
  # Optional annotations (e.g. cert-manager, proxy body size). Example TLS with cert-manager:
  # cert-manager.io/cluster-issuer: "letsencrypt-prod"
  # nginx.ingress.kubernetes.io/ssl-redirect: "true"
  annotations: {}
  tls:
    enabled: false
    # Name of a TLS Secret in the same namespace (create manually or via cert-manager)
    secretName: ""
  # Override host per environment in values-dev.yaml / values-staging.yaml / values-prod.yaml
  host: dev.el30mda.site
